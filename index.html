<!DOCTYPE html>
<html lang="my" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOLDEN CASH BOOK - ERP SYSTEM</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
  
  <!-- Font Awesome Icons CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* Force Browser Elements Dark Scheme */
    :root { color-scheme: dark; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #090d16; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #334155; }
    
    .nav-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .nav-btn:hover { padding-left: 1.25rem; background-color: rgba(30, 41, 59, 0.6); }
    .nav-btn.active { 
      background-color: #1e293b !important; 
      color: #ffffff !important; 
      font-weight: 700; 
      border-left: 4px solid #6366f1; 
    }
    
    .stats-card { background: linear-gradient(145deg, #0e172a, #0c1322); border: 1px solid #1e293b; }
    .table-container { border-radius: 0.75rem; border: 1px solid #1e293b; }
    
    table thead th {
      position: sticky; top: 0; z-index: 20;
      background-color: #0c1322 !important;
      padding: 12px 16px; font-size: 0.75rem !important;
      text-transform: uppercase; letter-spacing: 0.05em; color: #cbd5e1 !important;
    }
    table tbody td {
      padding: 10px 16px; border-bottom: 1px solid #1e293b;
      font-size: 0.8rem !important; white-space: nowrap !important;
    }
    table tbody tr:hover { background-color: rgba(30, 41, 59, 0.3); }

    /* Dark Mode Forms Overrides */
    input, select, textarea {
      background-color: #0f172a !important;
      border: 1px solid #1e293b !important;
      color: #f8fafc !important;
      font-size: 0.75rem !important;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #6366f1 !important;
      outline: none !important;
    }
    textarea::placeholder, input::placeholder {
      color: #64748b !important;
      opacity: 1 !important;
    }

    .view-panel { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-[#090d16] font-sans flex h-screen overflow-hidden text-slate-300">

  <!-- LOGIN OVERLAY -->
  <div id="login-overlay" class="fixed inset-0 bg-[#090d16] z-[100] flex items-center justify-center p-4">
    <div class="w-full max-w-sm bg-[#0c1322] border border-slate-800 rounded-2xl p-6 shadow-2xl space-y-5 text-slate-300">
      
      <div class="text-center space-y-1.5">
        <div class="inline-flex p-3 bg-indigo-500/10 text-indigo-400 rounded-xl mb-1">
          <i class="fa-solid fa-shield-halved text-2xl"></i>
        </div>
        <h2 class="text-base font-extrabold text-white tracking-wide">GOLDEN CASH BOOK</h2>
        <p class="text-[10px] text-slate-500 uppercase tracking-wider">Secure Authorization Portal</p>
      </div>

      <form id="login-form" onsubmit="handleLoginSubmit(event)" class="space-y-4 text-xs">
        <div>
          <label class="block font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Username</label>
          <select id="login-username" required class="w-full p-2.5 bg-[#0f172a] border border-slate-800 rounded-lg text-xs text-slate-200 outline-none focus:ring-1 focus:ring-indigo-500">
            <option value="">Select user role...</option>
            <option value="Owner">Owner</option>
            <option value="Admin">Admin</option>
            <option value="Finance">Finance</option>
            <option value="HR">HR</option>
            <option value="Account">Account</option>
            <option value="Main Cashier">Main Cashier</option>
            <option value="Cashier">Cashier</option>
          </select>
        </div>

        <div>
          <label class="block font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Password</label>
          <input type="password" id="login-password" required placeholder="••••••••" class="w-full p-2.5 bg-[#0f172a] border border-slate-800 rounded-lg text-xs text-slate-200 outline-none focus:ring-1 focus:ring-indigo-500">
        </div>

        <div id="login-error" class="hidden text-rose-400 font-semibold text-[11px] bg-rose-500/10 border border-rose-500/20 p-2.5 rounded-lg text-center"></div>

        <button type="submit" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg transition-all shadow-lg shadow-indigo-500/10 flex items-center justify-center gap-1.5">
          Enter System <i class="fa-solid fa-arrow-right-to-bracket"></i>
        </button>
      </form>
    </div>
  </div>

  <!-- MAIN ERP WORKSPACE -->
  <div id="erp-workspace" class="hidden flex h-full w-full">

    <aside class="w-64 bg-[#0c1322] border-r border-slate-800 flex flex-col h-full shadow-2xl shrink-0">
      <div class="h-[60px] px-4 border-b border-slate-800 flex items-center justify-between text-white bg-[#0e172a]">
        <div class="flex items-center gap-2.5 font-extrabold text-sm tracking-wide">
          <i class="fa-solid fa-graduation-cap text-indigo-400 text-lg"></i>
          <span>GOLDEN ERP</span>
        </div>
        <button onclick="handleLogout()" class="text-slate-500 hover:text-rose-400 transition p-1.5 rounded-lg">
          <i class="fa-solid fa-power-off text-xs"></i>
        </button>
      </div>

      <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto" id="sidebar-nav">
        <!-- Dashboard -->
        <button onclick="switchTab('dashboard')" id="btn-dashboard" class="nav-btn w-full text-left px-4 py-2.5 rounded-lg text-slate-400 hover:text-white flex items-center gap-3 text-xs">
          <i class="fa-solid fa-gauge-high w-4 text-center text-indigo-400"></i> Home Dashboard
        </button>

        <!-- Main Books -->
        <p class="text-[9px] font-black text-slate-600 px-4 uppercase tracking-widest mt-5 mb-2">Main Books</p>
        <button onclick="switchTab('bank')" id="btn-bank" class="nav-btn w-full text-left px-4 py-2.5 rounded-lg text-slate-400 hover:text-white flex items-center gap-3 text-xs">
          <i class="fa-solid fa-building-columns text-amber-400 w-4 text-center"></i> Main Bank Book
        </button>
        <button onclick="switchTab('cash')" id="btn-cash" class="nav-btn w-full text-left px-4 py-2.5 rounded-lg text-slate-400 hover:text-white flex items-center gap-3 text-xs">
          <i class="fa-solid fa-money-bill-wave text-emerald-400 w-4 text-center"></i> Main Cash Book
        </button>
        <button onclick="switchTab('income')" id="btn-income" class="nav-btn w-full text-left px-4 py-2.5 rounded-lg text-slate-400 hover:text-white flex items-center gap-3 text-xs">
          <i class="fa-solid fa-wallet text-sky-400 w-4 text-center"></i> Main Income Book
        </button>

        <!-- Expense Book -->
        <p class="text-[9px] font-black text-slate-600 px-4 uppercase tracking-widest mt-5 mb-2">Expense Book</p>
        <button onclick="switchTab('office')" id="btn-office" class="nav-btn w-full text-left px-4 py-2.5 rounded-lg text-slate-400 hover:text-white flex items-center gap-3 text-xs">
          <i class="fa-solid fa-briefcase text-cyan-400 w-4 text-center"></i> Office Exp Book
        </button>
        <button onclick="switchTab('kitchen')" id="btn-kitchen" class="nav-btn w-full text-left px-4 py-2.5 rounded-lg text-slate-400 hover:text-white flex items-center gap-3 text-xs">
          <i class="fa-solid fa-utensils text-rose-400 w-4 text-center"></i> Kitchen Exp Book
        </button>

        <!-- HR Section (Cashier ပိတ်မည် - Clean Single HR & Staff Button) -->
        <div id="nav-hr-section">
          <button onclick="switchTab('hr')" id="btn-hr" class="nav-btn w-full text-left px-4 py-2.5 rounded-lg text-slate-400 hover:text-white flex items-center gap-3 text-xs">
            <i class="fa-solid fa-money-check-dollar text-teal-400 w-4 text-center"></i> HR Payroll & Staff
          </button>
        </div>

        <!-- List & Inventory -->
        <p class="text-[9px] font-black text-slate-600 px-4 uppercase tracking-widest mt-5 mb-2">List & Inventory</p>
        <button onclick="switchTab('student')" id="btn-student" class="nav-btn w-full text-left px-4 py-2.5 rounded-lg text-slate-400 hover:text-white flex items-center gap-3 text-xs">
          <i class="fa-solid fa-user-graduate text-indigo-400 w-4 text-center"></i> Student List
        </button>
        <button onclick="switchTab('uniform')" id="btn-uniform" class="nav-btn w-full text-left px-4 py-2.5 rounded-lg text-slate-400 hover:text-white flex items-center gap-3 text-xs">
          <i class="fa-solid fa-shirt text-amber-400 w-4 text-center"></i> Uniform Ledger
        </button>
        <button onclick="switchTab('promotion')" id="btn-promotion" class="nav-btn w-full text-left px-4 py-2.5 rounded-lg text-slate-400 hover:text-white flex items-center gap-3 text-xs">
          <i class="fa-solid fa-coins text-yellow-400 w-4 text-center"></i> Promotion List
        </button>

        <!-- Reports & Financial Statements -->
        <p class="text-[9px] font-black text-slate-600 px-4 uppercase tracking-widest mt-5 mb-2">Reporting</p>
        <button onclick="switchTab('report-financial')" id="btn-report-financial" class="nav-btn w-full text-left px-4 py-2.5 rounded-lg text-slate-400 hover:text-white flex items-center gap-3 text-xs">
          <i class="fa-solid fa-chart-pie text-emerald-400 w-4 text-center"></i> Financial Report
        </button>
        <button onclick="switchTab('report-in-detail')" id="btn-report-in-detail" class="nav-btn w-full text-left px-4 py-2.5 rounded-lg text-slate-400 hover:text-white flex items-center gap-3 text-xs">
          <i class="fa-solid fa-file-invoice-dollar text-sky-400 w-4 text-center"></i> Income Detail (InDetail)
        </button>
        <button onclick="switchTab('report-in-rep')" id="btn-report-in-rep" class="nav-btn w-full text-left px-4 py-2.5 rounded-lg text-slate-400 hover:text-white flex items-center gap-3 text-xs">
          <i class="fa-solid fa-calendar-check text-indigo-400 w-4 text-center"></i> Monthly Income (InRep)
        </button>
        <button onclick="switchTab('report-staff-fund')" id="btn-report-staff-fund" class="nav-btn w-full text-left px-4 py-2.5 rounded-lg text-slate-400 hover:text-white flex items-center gap-3 text-xs">
          <i class="fa-solid fa-hand-holding-dollar text-teal-400 w-4 text-center"></i> Staff Fund Report
        </button>
        <button onclick="switchTab('report-student')" id="btn-report-student" class="nav-btn w-full text-left px-4 py-2.5 rounded-lg text-slate-400 hover:text-white flex items-center gap-3 text-xs">
          <i class="fa-solid fa-users-rectangle text-amber-400 w-4 text-center"></i> Student Report
        </button>

        <div id="nav-settings-section">
          <p class="text-[9px] font-black text-slate-600 px-4 uppercase tracking-widest mt-5 mb-2">System Controls</p>
          <button onclick="switchTab('settings')" id="btn-settings" class="nav-btn w-full text-left px-4 py-2.5 rounded-lg text-slate-400 hover:text-white flex items-center gap-3 text-xs">
            <i class="fa-solid fa-gears text-indigo-400 w-4 text-center"></i> System Settings & Controls
          </button>
        </div>
      </nav>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
      <header class="bg-[#0c1322] border-b border-slate-800 h-[60px] px-6 flex justify-between items-center z-10 shrink-0">
        <h1 id="page-title" class="text-base md:text-lg font-extrabold text-white tracking-wide">Home Dashboard</h1>

        <div id="live-metadata" class="text-xs font-bold text-emerald-400 bg-[#111c44] border border-emerald-500/20 px-3.5 py-1.5 rounded-lg">
          FY 2026-2027 | User: Anonymous
        </div>
      </header>

      <main id="main-content" class="p-6 overflow-y-auto flex-1 bg-[#090d16] relative">
        <div id="view-container"></div>
      </main>
    </div>
  </div>

  <div id="loading-overlay" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[150] flex flex-col items-center justify-center hidden">
    <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-indigo-500 mb-3"></div>
    <p class="text-xs font-bold text-slate-200 tracking-wide">Processing, please wait...</p>
  </div>

  <div id="toast-container" class="fixed bottom-5 right-5 z-[200] flex flex-col gap-2 pointer-events-none"></div>

  <!-- JS Modules -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/bank-cash-kit.js"></script>
  <script src="js/office.js"></script>
  <script src="js/hr.js"></script>
  <script src="js/staff.js"></script>
  <script src="js/income.js"></script>
  <script src="js/student.js"></script>
  <script src="js/promotion.js"></script>
  <script src="js/uniform.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
