<!-- views/report-staff-fund.html -->
<div class="space-y-5">

  <!-- 💡 ၁။ Top KPI Cards (၄ ခု) -->
  <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
    <div class="stats-card p-5 rounded-xl flex items-start gap-4">
      <div class="p-3.5 rounded-lg bg-emerald-500/10 text-emerald-400"><i class="fa-solid fa-gift text-xl"></i></div>
      <div>
        <p class="text-[10px] uppercase font-bold text-slate-500">Total Bonus Balance</p>
        <h3 id="report-fund-total-bonus" class="text-base font-extrabold text-white mt-1">0 MMK</h3>
      </div>
    </div>
    <div class="stats-card p-5 rounded-xl flex items-start gap-4">
      <div class="p-3.5 rounded-lg bg-teal-500/10 text-teal-400"><i class="fa-solid fa-piggy-bank text-xl"></i></div>
      <div>
        <p class="text-[10px] uppercase font-bold text-slate-500">Total Fund Balance</p>
        <h3 id="report-fund-total-fund" class="text-base font-extrabold text-white mt-1">0 MMK</h3>
      </div>
    </div>
    <div class="stats-card p-5 rounded-xl flex items-start gap-4">
      <div class="p-3.5 rounded-lg bg-indigo-500/10 text-indigo-400"><i class="fa-solid fa-wallet text-xl"></i></div>
      <div>
        <p class="text-[10px] uppercase font-bold text-slate-500">Grand Total Balances</p>
        <h3 id="report-fund-total-all" class="text-base font-extrabold text-white mt-1">0 MMK</h3>
      </div>
    </div>
    <div class="stats-card p-5 rounded-xl flex items-start gap-4">
      <div class="p-3.5 rounded-lg bg-sky-500/10 text-sky-400"><i class="fa-solid fa-users text-xl"></i></div>
      <div>
        <p class="text-[10px] uppercase font-bold text-slate-500">Total Staff Listed</p>
        <h3 id="report-fund-total-count" class="text-base font-extrabold text-white mt-1">0</h3>
      </div>
    </div>
  </div>

  <!-- ၂။ Control Bar -->
  <div class="flex flex-col sm:flex-row justify-between items-center bg-[#0c1322] border border-slate-800 p-4 rounded-xl gap-4">
    <div class="relative w-full sm:w-80">
      <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i class="fa-solid fa-magnifying-glass text-xs"></i></span>
      <input type="text" id="report-staff-fund-search" oninput="onSearchInputReportStaffFund()" placeholder="Search staff name, ID..." class="w-full pl-9 pr-4 py-2 text-xs rounded-lg bg-[#0f172a] border border-slate-800 text-white focus:outline-none focus:border-indigo-500 transition-all">
    </div>
    <div class="flex items-center gap-2.5 w-full sm:w-auto justify-end">
      <button onclick="loadReportStaffFundData(false)" class="p-2 bg-slate-850 hover:bg-slate-800 border border-slate-800 text-slate-300 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all"><i class="fa-solid fa-rotate text-xs"></i> Refresh</button>
      <button onclick="exportToCSVReportStaffFund()" class="p-2 bg-slate-850 hover:bg-slate-800 border border-slate-800 text-slate-300 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all"><i class="fa-solid fa-file-export text-xs"></i> Export CSV</button>
    </div>
  </div>

  <!-- ၃။ Staff Fund Table -->
  <div class="table-container bg-[#0c1322] border border-slate-800 shadow-2xl relative overflow-x-auto">
    <table class="w-full text-left border-collapse min-w-[1200px]">
      <thead>
        <tr class="bg-[#0e172a]">
          <th scope="col" class="w-12 text-center text-slate-400 text-xs py-3">NO</th>
          <th scope="col" class="w-28 text-center text-slate-400 text-xs py-3">FUND DATE</th>
          <th scope="col" class="w-28 text-slate-400 text-xs py-3">STAFF ID</th>
          <th scope="col" class="min-w-[200px] text-slate-400 text-xs py-3">NAME</th>
          <th scope="col" class="w-32 text-right text-emerald-400 text-xs py-3">BONUS BALANCE</th>
          <th scope="col" class="w-32 text-right text-teal-400 text-xs py-3">FUND BALANCE</th>
          <th scope="col" class="w-36 text-right text-indigo-400 text-xs py-3 bg-indigo-500/5 pr-4">TOTAL BALANCES</th>
          <th scope="col" class="w-24 text-slate-400 text-xs py-3">STATUS</th>
        </tr>
      </thead>
      <tbody id="report-staff-fund-table-body" class="divide-y divide-slate-800/40 text-slate-300"></tbody>
    </table>
  </div>

</div>

<!-- 💡 AUTO-LOAD TRIGGER -->
<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" onload="if(typeof loadReportStaffFundData==='function'){loadReportStaffFundData(false);} this.remove();" class="hidden">
