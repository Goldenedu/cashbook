<!-- views/promotion.html -->
<div class="space-y-5">

  <!-- ၁။ Control Action Bar & Filters -->
  <div class="flex flex-col md:flex-row justify-between items-center bg-[#0c1322] border border-slate-800 p-4 rounded-xl gap-4">
    
    <div class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto">
      <!-- Search Input -->
      <div class="relative w-full sm:w-64">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i class="fa-solid fa-magnifying-glass text-xs"></i></span>
        <input type="text" id="promo-search" oninput="onSearchInputPromotion()" placeholder="Search class..." class="w-full pl-9 pr-4 py-2 text-xs rounded-lg bg-[#0f172a] border border-slate-800 text-white focus:outline-none focus:border-indigo-500 transition-all">
      </div>

      <!-- FY Filter -->
      <div class="w-full sm:w-44">
        <select id="promo-filter-fy" onchange="applyPromotionFilters()" class="w-full text-xs bg-[#0f172a] border border-slate-800 text-white rounded-lg px-3 py-2 outline-none focus:border-indigo-500 transition-all font-bold">
          <option value="">-- All FY --</option>
        </select>
      </div>

      <!-- Category Filter -->
      <div class="w-full sm:w-44">
        <select id="promo-filter-cat" onchange="applyPromotionFilters()" class="w-full text-xs bg-[#0f172a] border border-slate-800 text-white rounded-lg px-3 py-2 outline-none focus:border-indigo-500 transition-all font-bold">
          <option value="">-- All Categories --</option>
        </select>
      </div>
    </div>

    <div class="flex items-center gap-2.5 w-full md:w-auto justify-end">
      <button onclick="loadPromotionData(false)" class="p-2 bg-slate-850 hover:bg-slate-800 border border-slate-800 text-slate-300 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all">
        <i class="fa-solid fa-rotate text-xs"></i> Refresh
      </button>

      <button onclick="exportToCSVPromotion()" class="p-2 bg-slate-850 hover:bg-slate-800 border border-slate-800 text-slate-300 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all">
        <i class="fa-solid fa-file-export text-xs"></i> Export CSV
      </button>

      <button onclick="openAddModalPromotion()" class="p-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-xs font-black flex items-center gap-1.5 shadow-lg shadow-indigo-600/10 transition-all">
        <i class="fa-solid fa-plus text-xs"></i> Add Rate Entry
      </button>
    </div>

  </div>

  <!-- ၂။ Promotion Matrix Table Grid -->
  <div class="table-container bg-[#0c1322] border border-slate-800 shadow-2xl relative overflow-x-auto">
    <table class="w-full text-left border-collapse min-w-[1600px]">
      <thead>
        <tr class="bg-[#0e172a]">
          <th scope="col" class="w-12 text-center text-slate-400 text-xs py-3">NO</th>
          <th scope="col" class="w-24 text-slate-400 text-xs py-3">FY</th>
          <th scope="col" class="w-32 text-slate-400 text-xs py-3">CLASS</th>
          <th scope="col" class="w-36 text-slate-400 text-xs py-3">CATEGORY</th>
          <th scope="col" class="w-28 text-right text-indigo-400 text-xs py-3">REGISTRATION</th>
          <th scope="col" class="w-28 text-right text-slate-400 text-xs py-3">ORIGINAL PRICE</th>
          <th scope="col" class="w-24 text-right text-teal-400 text-xs py-3">PRO A</th>
          <th scope="col" class="w-24 text-right text-teal-400 text-xs py-3">PRO B</th>
          <th scope="col" class="w-24 text-right text-teal-400 text-xs py-3">PRO C</th>
          <th scope="col" class="w-24 text-right text-teal-400 text-xs py-3">PRO D</th>
          <th scope="col" class="w-24 text-right text-teal-400 text-xs py-3">PRO E</th>
          <th scope="col" class="w-28 text-right text-amber-400 text-xs py-3">HALF SCHOLAR</th>
          <th scope="col" class="w-28 text-right text-emerald-400 text-xs py-3">FULL SCHOLAR</th>
          <th scope="col" class="min-w-[150px] text-slate-400 text-xs py-3">REMARK</th>
          <th scope="col" class="w-24 text-center text-slate-400 text-xs py-3 right-0 sticky bg-[#0c1322] border-l border-slate-800 shadow-lg">ACTION</th>
        </tr>
      </thead>
      <tbody id="promo-table-body" class="divide-y divide-slate-800/40 text-slate-300">
        <!-- Dynamic Rows generated by js/promotion.js -->
      </tbody>
    </table>
  </div>

  <!-- ၃။ Info Footer -->
  <div class="flex justify-between items-center bg-[#0c1322] border border-slate-800 px-6 py-3.5 rounded-xl">
    <div class="text-xs font-semibold text-slate-400 tracking-wide">
      Showing <span class="text-indigo-400 font-bold" id="promo-total-count">0</span> matching fee rates
    </div>
    <div class="text-[10px] text-slate-500 uppercase tracking-widest font-black">
      Fee Matrix Reference Table
    </div>
  </div>

</div>

<!-- ၄။ Add / Edit Promotion Rate Modal -->
<div id="promo-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4">
  <div class="bg-[#0c1322] border border-slate-800 rounded-2xl w-full max-w-xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh] animate-in fade-in zoom-in-95 duration-200">
    <div class="px-6 py-4 border-b border-slate-800 flex justify-between items-center bg-[#0e172a] shrink-0">
      <h3 id="promo-form-title" class="text-sm font-black text-white uppercase tracking-wider">Add Promotion Rate</h3>
      <button onclick="closePromotionModal()" class="text-slate-500 hover:text-white transition"><i class="fa-solid fa-xmark text-sm"></i></button>
    </div>

    <form id="promo-form" onsubmit="savePromotionForm(event)" class="p-6 space-y-4 overflow-y-auto flex-1 text-xs">
      <input type="hidden" id="promo-uniqueId">

      <div class="grid grid-cols-3 gap-4">
        <!-- 💡 1. Fiscal Year Dropdown (3 နှစ်စာ Dynamic) -->
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Fiscal Year</label>
          <select id="promo-fy" required class="w-full font-bold text-slate-100 bg-[#0f172a] border border-slate-800 rounded-lg p-2.5 outline-none focus:border-indigo-500"></select>
        </div>
        
        <!-- 💡 2. Class Dropdown (config.js မှ Dynamic) -->
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Class</label>
          <select id="promo-class" required class="w-full font-bold text-slate-100 bg-[#0f172a] border border-slate-800 rounded-lg p-2.5 outline-none focus:border-indigo-500"></select>
        </div>

        <!-- 💡 3. Category Dropdown (config.js မှ Dynamic) -->
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Category</label>
          <select id="promo-category" required class="w-full font-bold text-slate-100 bg-[#0f172a] border border-slate-800 rounded-lg p-2.5 outline-none focus:border-indigo-500"></select>
        </div>
      </div>

      <!-- 💡 Number Inputs (lang="en" & font-mono ဖြင့် အင်္ဂလိပ်ဂဏန်း ပြသမည်) -->
      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1">
          <label class="font-bold text-indigo-400 uppercase tracking-wide">Registration Fee</label>
          <input type="number" id="promo-registration" value="0" lang="en" required class="w-full text-right font-bold text-indigo-400 font-mono bg-[#0f172a] border border-slate-800 rounded-lg p-2.5 outline-none focus:border-indigo-500">
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Original Price</label>
          <input type="number" id="promo-original-price" value="0" lang="en" required class="w-full text-right font-bold text-slate-100 font-mono bg-[#0f172a] border border-slate-800 rounded-lg p-2.5 outline-none focus:border-indigo-500">
        </div>
      </div>

      <div class="grid grid-cols-3 gap-3">
        <div class="flex flex-col gap-1">
          <label class="font-bold text-teal-400 uppercase tracking-wide">Pro A Rate</label>
          <input type="number" id="promo-pro-a" value="0" lang="en" class="w-full text-right font-mono bg-[#0f172a] border border-slate-800 rounded-lg p-2.5 outline-none focus:border-indigo-500">
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold text-teal-400 uppercase tracking-wide">Pro B Rate</label>
          <input type="number" id="promo-pro-b" value="0" lang="en" class="w-full text-right font-mono bg-[#0f172a] border border-slate-800 rounded-lg p-2.5 outline-none focus:border-indigo-500">
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold text-teal-400 uppercase tracking-wide">Pro C Rate</label>
          <input type="number" id="promo-pro-c" value="0" lang="en" class="w-full text-right font-mono bg-[#0f172a] border border-slate-800 rounded-lg p-2.5 outline-none focus:border-indigo-500">
        </div>
      </div>

      <div class="grid grid-cols-4 gap-3">
        <div class="flex flex-col gap-1">
          <label class="font-bold text-teal-400 uppercase tracking-wide">Pro D Rate</label>
          <input type="number" id="promo-pro-d" value="0" lang="en" class="w-full text-right font-mono bg-[#0f172a] border border-slate-800 rounded-lg p-2.5 outline-none focus:border-indigo-500">
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold text-teal-400 uppercase tracking-wide">Pro E Rate</label>
          <input type="number" id="promo-pro-e" value="0" lang="en" class="w-full text-right font-mono bg-[#0f172a] border border-slate-800 rounded-lg p-2.5 outline-none focus:border-indigo-500">
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold text-amber-400 uppercase tracking-wide">Half Scholar</label>
          <input type="number" id="promo-half-scholar" value="0" lang="en" class="w-full text-right text-amber-400 font-bold font-mono bg-[#0f172a] border border-slate-800 rounded-lg p-2.5 outline-none focus:border-indigo-500">
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold text-emerald-400 uppercase tracking-wide">Full Scholar</label>
          <input type="number" id="promo-full-scholar" value="0" lang="en" class="w-full text-right text-emerald-400 font-bold font-mono bg-[#0f172a] border border-slate-800 rounded-lg p-2.5 outline-none focus:border-indigo-500">
        </div>
      </div>

      <div class="flex flex-col gap-1">
        <label class="font-bold text-slate-400 uppercase tracking-wide">Remark</label>
        <textarea id="promo-remark" rows="2" placeholder="မှတ်ချက်..." class="w-full bg-[#0f172a] border border-slate-800 text-slate-100 rounded-lg p-2.5 outline-none focus:border-indigo-500"></textarea>
      </div>

      <div class="flex justify-end items-center gap-3 pt-4 border-t border-slate-800">
        <button type="button" onclick="closePromotionModal()" class="px-4 py-2 rounded-lg text-xs font-bold text-slate-400 hover:text-white transition">Cancel</button>
        <button type="submit" class="px-5 py-2 rounded-lg text-xs font-black bg-indigo-600 hover:bg-indigo-500 text-white shadow-lg shadow-indigo-600/10 transition-all">Confirm</button>
      </div>
    </form>
  </div>
</div>
