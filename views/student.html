<!-- views/student.html -->
<div class="space-y-5">

  <!-- ၁။ Top KPI Stats Cards Grid -->
  <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
    <div class="stats-card p-5 rounded-xl flex items-start gap-4">
      <div class="p-3.5 rounded-lg bg-emerald-500/10 text-emerald-400"><i class="fa-solid fa-user-check text-xl"></i>
      </div>
      <div>
        <p class="text-[10px] uppercase font-bold tracking-wider text-slate-500">Total Active</p>
        <h3 id="stu-total-active" class="text-base font-extrabold text-white mt-1">0</h3>
      </div>
    </div>
    <div class="stats-card p-5 rounded-xl flex items-start gap-4">
      <div class="p-3.5 rounded-lg bg-rose-500/10 text-rose-400"><i class="fa-solid fa-user-slash text-xl"></i></div>
      <div>
        <p class="text-[10px] uppercase font-bold tracking-wider text-slate-500">Total Inactive</p>
        <h3 id="stu-total-inactive" class="text-base font-extrabold text-white mt-1">0</h3>
      </div>
    </div>
    <div class="stats-card p-5 rounded-xl flex items-start gap-4">
      <div class="p-3.5 rounded-lg bg-indigo-500/10 text-indigo-400"><i class="fa-solid fa-user-graduate text-xl"></i>
      </div>
      <div>
        <p class="text-[10px] uppercase font-bold tracking-wider text-slate-500">Total Students</p>
        <h3 id="stu-total-students" class="text-base font-extrabold text-white mt-1">0</h3>
      </div>
    </div>
    <div class="stats-card p-5 rounded-xl flex items-start gap-4">
      <div class="p-3.5 rounded-lg bg-sky-500/10 text-sky-400"><i class="fa-solid fa-list-check text-xl"></i></div>
      <div>
        <p class="text-[10px] uppercase font-bold tracking-wider text-slate-500">Entries Listed</p>
        <h3 id="stu-entries-count" class="text-base font-extrabold text-white mt-1">0</h3>
      </div>
    </div>
  </div>

  <!-- ၂။ Control Search & Action Bar -->
  <div
    class="flex flex-col md:flex-row justify-between items-center bg-[#0c1322] border border-slate-800 p-4 rounded-xl gap-4">
    <div class="relative w-full md:w-[500px]">
      <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i
          class="fa-solid fa-magnifying-glass text-xs"></i></span>
      <input type="text" id="student-search" oninput="onSearchInputStudent()"
        placeholder="Search name, class, FYID, phone..."
        class="w-full pl-9 pr-4 py-2 text-xs rounded-lg bg-slate-950 border border-slate-800 text-white focus:outline-none focus:border-indigo-500 transition-all">
    </div>

    <div class="flex items-center gap-2.5 w-full md:w-auto justify-end">
      <button onclick="loadStudentData(false)"
        class="p-2 bg-slate-850 hover:bg-slate-800 border border-slate-800 text-slate-300 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all">
        <i class="fa-solid fa-rotate text-xs"></i> Refresh
      </button>

      <button onclick="exportToCSVStudent()"
        class="p-2 bg-slate-850 hover:bg-slate-800 border border-slate-800 text-slate-300 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all">
        <i class="fa-solid fa-file-export text-xs"></i> Export CSV
      </button>

      <button onclick="openAddModalStudent()"
        class="p-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-xs font-black flex items-center gap-1.5 shadow-lg shadow-indigo-600/10 transition-all">
        <i class="fa-solid fa-plus text-xs"></i> Add Student Record
      </button>
    </div>
  </div>

  <!-- ၃။ 16-Column Data Grid Table -->
  <div class="table-container bg-[#0c1322] border border-slate-800 shadow-2xl relative overflow-x-auto">
    <table class="w-full text-left border-collapse min-w-[1800px]">
      <thead>
        <tr class="bg-[#0e172a]">
          <th scope="col" class="w-12 text-center text-slate-400 text-xs py-3">NO</th>
          <th scope="col" class="w-28 text-slate-400 text-xs py-3">DATE</th>
          <th scope="col" class="w-24 text-slate-400 text-xs py-3">FY</th>
          <th scope="col" class="w-32 text-slate-400 text-xs py-3">FYID</th>
          <th scope="col" class="min-w-[200px] text-slate-400 text-xs py-3">NAME</th>
          <th scope="col" class="w-32 text-slate-400 text-xs py-3">CLASS</th>
          <th scope="col" class="w-32 text-slate-400 text-xs py-3">CATEGORY</th>
          <th scope="col" class="w-24 text-slate-400 text-xs py-3">PROMO</th>
          <th scope="col" class="w-32 text-slate-400 text-xs py-3">STU STATUS</th>
          <th scope="col" class="w-24 text-slate-400 text-xs py-3">STATUS</th>
          <th scope="col" class="w-24 text-slate-400 text-xs py-3">GENDER</th>
          <th scope="col" class="w-36 text-slate-400 text-xs py-3">TRANSFER DATE</th>
          <th scope="col" class="w-44 text-slate-400 text-xs py-3">PARENTS NAME</th>
          <th scope="col" class="w-36 text-slate-400 text-xs py-3">PHONE NO</th>
          <th scope="col" class="min-w-[200px] text-slate-400 text-xs py-3">ADDRESS</th>
          <th scope="col"
            class="w-24 text-center text-slate-400 text-xs py-3 right-0 sticky bg-[#0c1322] border-l border-slate-800 shadow-lg">
            ACTION</th>
        </tr>
      </thead>
      <tbody id="student-table-body" class="divide-y divide-slate-800/40 text-slate-300">
        <!-- Dynamic Rows generated by js/student.js -->
      </tbody>
    </table>
  </div>

  <!-- ၄။ Pagination Tray -->
  <div
    class="flex flex-col sm:flex-row justify-between items-center gap-4 bg-[#0c1322] border border-slate-800 px-6 py-3.5 rounded-xl">
    <div id="stu-pagination-info" class="text-xs font-semibold text-slate-400 tracking-wide">
      Showing entries...
    </div>

    <div class="flex items-center gap-2">
      <button onclick="changePageStudent(-1)" id="stu-btn-prev"
        class="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg bg-slate-850 hover:bg-slate-800 border border-slate-800 text-slate-300 hover:text-white font-bold transition-all disabled:opacity-30 disabled:pointer-events-none text-xs">
        <i class="fa-solid fa-chevron-left text-[10px]"></i> Previous
      </button>
      <button onclick="changePageStudent(1)" id="stu-btn-next"
        class="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg bg-slate-850 hover:bg-slate-800 border border-slate-800 text-slate-300 hover:text-white font-bold transition-all disabled:opacity-30 disabled:pointer-events-none text-xs">
        Next <i class="fa-solid fa-chevron-right text-[10px]"></i>
      </button>
    </div>
  </div>

</div>

<!-- ၅။ Add / Edit Student Profile Modal -->
<div id="student-modal"
  class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4">
  <div
    class="bg-[#0c1322] border border-slate-800 rounded-2xl w-full max-w-xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh] animate-in fade-in zoom-in-95 duration-200">
    <div class="px-6 py-4 border-b border-slate-800 flex justify-between items-center bg-[#0e172a] shrink-0">
      <h3 id="stu-form-title" class="text-sm font-black text-white uppercase tracking-wider">Add Student Record</h3>
      <button onclick="closeStudentModal()" class="text-slate-500 hover:text-white transition"><i
          class="fa-solid fa-xmark text-sm"></i></button>
    </div>

    <form id="student-form" onsubmit="saveStudentForm(event)" class="p-6 space-y-4 overflow-y-auto flex-1 text-xs">
      <input type="hidden" id="stu-uniqueId">
      <input type="hidden" id="stu-id">

      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Date</label>
          <input type="date" id="stu-date" required class="w-full">
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Fiscal Year (ပညာသင်နှစ်)</label>
          <select id="stu-fy" required class="w-full"></select>
        </div>
      </div>

      <div class="flex flex-col gap-1">
        <label class="font-bold text-slate-400 uppercase tracking-wide">Student Name (ကျောင်းသားအမည်)</label>
        <input type="text" id="stu-name" required placeholder="မောင် / မ xxxx..."
          class="w-full font-bold text-slate-100">
      </div>

      <div class="grid grid-cols-3 gap-4">
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Class (အတန်း)</label>
          <select id="stu-class" required class="w-full">
            <option value="Pre School">Pre School</option>
            <option value="KG Student">KG Student</option>
            <option value="Grade 1">Grade 1</option>
            <option value="Grade 2">Grade 2</option>
            <option value="Grade 3">Grade 3</option>
            <option value="Grade 4">Grade 4</option>
            <option value="Grade 5">Grade 5</option>
            <option value="Grade 6">Grade 6</option>
            <option value="Grade 7">Grade 7</option>
            <option value="Grade 8">Grade 8</option>
            <option value="Grade 9">Grade 9</option>
            <option value="Grade 10">Grade 10</option>
            <option value="Grade 11">Grade 11</option>
            <option value="Grade 12">Grade 12</option>
          </select>
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Category (နေထိုင်မှု)</label>
          <select id="stu-category" required class="w-full">
            <option value="Boarder">Boarder</option>
            <option value="Semi Boarder">Semi Boarder</option>
            <option value="Day Student">Day Student</option>
          </select>
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Promo Plan</label>
          <select id="stu-promo" required class="w-full">
            <option value="Original price">Original price</option>
            <option value="Pro A">Pro A</option>
            <option value="Pro B">Pro B</option>
            <option value="Pro C">Pro C</option>
            <option value="Pro D">Pro D</option>
            <option value="Pro E">Pro E</option>
            <option value="Half scholar">Half scholar</option>
            <option value="Full scholar">Full scholar</option>
          </select>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Student Status</label>
          <select id="stu-stustatus" required class="w-full">
            <option value="New Student">New Student (ကျောင်းသားသစ်)</option>
            <option value="Old Student">Old Student (ကျောင်းသားဟောင်း)</option>
          </select>
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold text-rose-400 uppercase tracking-wide">Transfer Date (နုတ်ထွက်ရက်)</label>
          <input type="date" id="stu-transferdate" class="w-full text-rose-400 border border-slate-800 bg-rose-500/5">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Parents Name (မိဘအမည်)</label>
          <input type="text" id="stu-parents" placeholder="အဘ ဦးxxxx / အမိ ဒေါ်xxxx..." class="w-full">
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Phone No (ဖုန်းနံပါတ်)</label>
          <input type="text" id="stu-phone" placeholder="09xxxxxxxxx" class="w-full font-mono">
        </div>
      </div>

      <div class="flex flex-col gap-1">
        <label class="font-bold text-slate-400 uppercase tracking-wide">Address (နေရပ်လိပ်စာ)</label>
        <textarea id="stu-address" rows="2" placeholder="အသေးစိတ် နေရပ်လိပ်စာ..." class="w-full"></textarea>
      </div>

      <div class="flex justify-end items-center gap-3 pt-4 border-t border-slate-800">
        <button type="button" onclick="closeStudentModal()"
          class="px-4 py-2 rounded-lg text-xs font-bold text-slate-400 hover:text-white transition">Cancel</button>
        <button type="submit"
          class="px-5 py-2 rounded-lg text-xs font-black bg-indigo-600 hover:bg-indigo-500 text-white shadow-lg shadow-indigo-600/10 transition-all">Confirm</button>
      </div>
    </form>
  </div>
</div>
