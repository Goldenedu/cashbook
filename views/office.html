<!-- views/office.html -->
<div class="space-y-5">

  <!-- ၁။ Top KPI Stats Cards Grid -->
  <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
    <!-- Total Income -->
    <div class="stats-card p-5 rounded-xl flex items-start gap-4">
      <div class="p-3.5 rounded-lg bg-emerald-500/10 text-emerald-400">
        <i class="fa-solid fa-arrow-trend-up text-xl"></i>
      </div>
      <div>
        <p class="text-[10px] uppercase font-bold tracking-wider text-slate-500">Total Income</p>
        <h3 id="off-total-income" class="text-base font-extrabold text-white mt-1">0 MMK</h3>
      </div>
    </div>

    <!-- Total Expense -->
    <div class="stats-card p-5 rounded-xl flex items-start gap-4">
      <div class="p-3.5 rounded-lg bg-rose-500/10 text-rose-400">
        <i class="fa-solid fa-arrow-trend-down text-xl"></i>
      </div>
      <div>
        <p class="text-[10px] uppercase font-bold tracking-wider text-slate-500">Total Expense</p>
        <h3 id="off-total-expense" class="text-base font-extrabold text-white mt-1">0 MMK</h3>
      </div>
    </div>

    <!-- Balances -->
    <div class="stats-card p-5 rounded-xl flex items-start gap-4">
      <div class="p-3.5 rounded-lg bg-indigo-500/10 text-indigo-400">
        <i class="fa-solid fa-scale-balanced text-xl"></i>
      </div>
      <div>
        <p class="text-[10px] uppercase font-bold tracking-wider text-slate-500">Balances</p>
        <h3 id="off-balance" class="text-base font-extrabold text-white mt-1">0 MMK</h3>
      </div>
    </div>

    <!-- Total Entries -->
    <div class="stats-card p-5 rounded-xl flex items-start gap-4">
      <div class="p-3.5 rounded-lg bg-sky-500/10 text-sky-400">
        <i class="fa-solid fa-list-check text-xl"></i>
      </div>
      <div>
        <p class="text-[10px] uppercase font-bold tracking-wider text-slate-500">Total Entries</p>
        <h3 id="off-entries-count" class="text-base font-extrabold text-white mt-1">0</h3>
      </div>
    </div>
  </div>

  <!-- ၂။ Control Search & Action Bar -->
  <div class="flex flex-col md:flex-row justify-between items-center bg-[#0c1322] border border-slate-800 p-4 rounded-xl gap-4">
    <!-- Search Input -->
    <div class="relative w-full md:w-[500px]">
      <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
        <i class="fa-solid fa-magnifying-glass text-xs"></i>
      </span>
      <input type="text" id="office-search" oninput="onSearchInputOffice()" placeholder="Search description, category, product ID..." class="w-full pl-9 pr-4 py-2 text-xs rounded-lg bg-slate-950 border border-slate-800 text-white focus:outline-none focus:border-indigo-500 transition-all">
    </div>

    <!-- Action Buttons -->
    <div class="flex items-center gap-2.5 w-full md:w-auto justify-end">
      <button onclick="loadOfficeData(false)" class="p-2 bg-slate-850 hover:bg-slate-800 border border-slate-800 text-slate-300 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all" title="Refresh Data">
        <i class="fa-solid fa-rotate text-xs"></i> Refresh
      </button>

      <button onclick="exportToCSVOffice()" class="p-2 bg-slate-850 hover:bg-slate-800 border border-slate-800 text-slate-300 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all">
        <i class="fa-solid fa-file-export text-xs"></i> Export CSV
      </button>

      <button onclick="openAddModalOffice()" class="p-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-xs font-black flex items-center gap-1.5 shadow-lg shadow-indigo-600/10 transition-all">
        <i class="fa-solid fa-plus text-xs"></i> Add Office Entry
      </button>
    </div>
  </div>

  <!-- ၃။ Data Grid Table -->
  <div class="table-container bg-[#0c1322] border border-slate-800 shadow-2xl relative overflow-x-auto">
    <table class="w-full text-left border-collapse min-w-[1700px]">
      <thead>
        <tr class="bg-[#0e172a]">
          <th scope="col" class="w-12 text-center text-slate-400 text-xs py-3">NO</th>
          <th scope="col" class="w-28 text-slate-400 text-xs py-3">DATE</th>
          <th scope="col" class="w-40 text-slate-400 text-xs py-3">CATEGORY</th>
          <th scope="col" class="w-32 text-slate-400 text-xs py-3">ID PID</th>
          <th scope="col" class="min-w-[250px] text-slate-400 text-xs py-3">DESCRIPTION</th>
          <th scope="col" class="w-20 text-right text-slate-400 text-xs py-3">QTY</th>
          <th scope="col" class="w-28 text-right text-slate-400 text-xs py-3">PRICE</th>
          <th scope="col" class="w-24 text-slate-400 text-xs py-3">METHOD</th>
          <th scope="col" class="w-32 text-right text-emerald-400 text-xs py-3">DEBIT</th>
          <th scope="col" class="w-32 text-right text-rose-400 text-xs py-3">CREDIT</th>
          <th scope="col" class="w-36 text-right text-slate-400 text-xs py-3">BALANCES</th>
          <th scope="col" class="w-32 text-right text-rose-400 text-xs py-3">LIABILITIES</th>
          <th scope="col" class="w-36 text-slate-400 text-xs py-3">TRANSFER</th>
          <th scope="col" class="w-36 text-slate-400 text-xs py-3">VR NO</th>
          <th scope="col" class="w-24 text-slate-400 text-xs py-3">MY</th>
          <th scope="col" class="w-28 text-slate-400 text-xs py-3">FY</th>
          <th scope="col" class="w-24 text-center text-slate-400 text-xs py-3 right-0 sticky bg-[#0c1322] border-l border-slate-800 shadow-lg">ACTION</th>
        </tr>
      </thead>
      <tbody id="office-table-body" class="divide-y divide-slate-800/40 text-slate-300">
        <!-- Dynamic Rows generated by js/office.js -->
      </tbody>
    </table>
  </div>

  <!-- ၄။ Pagination Controller Tray -->
  <div class="flex flex-col sm:flex-row justify-between items-center gap-4 bg-[#0c1322] border border-slate-800 px-6 py-3.5 rounded-xl">
    <div id="off-pagination-info" class="text-xs font-semibold text-slate-400 tracking-wide">
      Showing <span class="text-indigo-400 font-bold">1</span> to <span class="text-indigo-400 font-bold">30</span> of <span class="text-indigo-400 font-bold">0</span> entries
    </div>
    
    <div class="flex items-center gap-2">
      <button onclick="changePageOffice(-1)" id="off-btn-prev" class="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg bg-slate-850 hover:bg-slate-800 border border-slate-800 text-slate-300 hover:text-white font-bold transition-all disabled:opacity-30 disabled:pointer-events-none text-xs">
        <i class="fa-solid fa-chevron-left text-[10px]"></i> Previous
      </button>
      <button onclick="changePageOffice(1)" id="off-btn-next" class="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg bg-slate-850 hover:bg-slate-800 border border-slate-800 text-slate-300 hover:text-white font-bold transition-all disabled:opacity-30 disabled:pointer-events-none text-xs">
        Next <i class="fa-solid fa-chevron-right text-[10px]"></i>
      </button>
    </div>
  </div>

</div>

<!-- ၅။ Add / Edit Office Entry Modal -->
<div id="office-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4">
  <div class="bg-[#0c1322] border border-slate-800 rounded-2xl w-full max-w-xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh] animate-in fade-in zoom-in-95 duration-200">
    
    <div class="px-6 py-4 border-b border-slate-800 flex justify-between items-center bg-[#0e172a] shrink-0">
      <h3 id="office-form-title" class="text-sm font-black text-white uppercase tracking-wider">Add Office Expense Entry</h3>
      <button onclick="closeOfficeModal()" class="text-slate-500 hover:text-white transition">
        <i class="fa-solid fa-xmark text-sm"></i>
      </button>
    </div>

    <form id="office-form" onsubmit="saveOfficeForm(event)" class="p-6 space-y-4 overflow-y-auto flex-1 text-xs">
      <input type="hidden" id="office-uniqueId">
      
      <!-- Row 1: DATE & CATEGORY -->
      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Date</label>
          <input type="date" id="office-date" required class="w-full">
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Category</label>
          <select id="office-category" onchange="onCategoryOrProductChangeOffice()" required class="w-full">
            <option value="Non">Non</option>
            <option value="Adv / Ref">Adv / Ref</option>
            <option value="Liabilities">Liabilities</option>
            <option value="Admin Exp">Admin Exp</option>
            <option value="Vehicle Related Exp">Vehicle Related Exp</option>
            <option value="Assets Materials">Assets Materials</option>
            <option value="Donation & Social">Donation & Social</option>
            <option value="HR Staff Benefit">HR Staff Benefit</option>
            <option value="Construction">Construction</option>
            <option value="Student Refund">Student Refund</option>
            <option value="Drawing Account 1">Drawing Account 1</option>
            <option value="Drawing Account 2">Drawing Account 2</option>
            <option value="Adv Capital Snack Shop">Adv Capital Snack Shop</option>
            <option value="Ferry Payment">Ferry Payment</option>
            <option value="Advance Uniform">Advance Uniform</option>
            <option value="Opening">Opening</option>
            <option value="Income">Income</option>
            <option value="Closing">Closing</option>
            <option value="Transfer">Transfer</option>
          </select>
        </div>
      </div>

      <!-- Advance Uniform Product Selection Container (Conditionally Shown) -->
      <div id="office-product-container" class="space-y-1 hidden">
        <div class="flex justify-between items-center">
          <label class="font-bold text-amber-400 uppercase tracking-wide">Select Uniform Product ID</label>
          <span id="office-stock-badge" class="text-[10px] font-extrabold text-emerald-400 bg-emerald-500/10 px-2 py-0.5 rounded hidden"></span>
        </div>
        <select id="office-product-id" onchange="onCategoryOrProductChangeOffice()" class="w-full font-mono">
          <option value="">-- Select Product ID --</option>
        </select>
      </div>

      <!-- Row 2: QTY (UNIT) & UNIT PRICE -->
      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Qty (Unit / အရေအတွက်)</label>
          <input type="number" id="office-unit" value="1" oninput="calculateDebitOffice()" class="w-full text-right font-bold text-slate-100">
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Unit Price (နှုန်းထား)</label>
          <input type="number" id="office-unit-price" value="0" oninput="calculateDebitOffice()" class="w-full text-right font-bold text-slate-100">
        </div>
      </div>

      <!-- Row 3: METHOD & TRANSFER -->
      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Method</label>
          <select id="office-method" required class="w-full">
            <option value="Cash">Cash</option>
            <option value="Bank">Bank</option>
          </select>
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Transfer To</label>
          <select id="office-transfer" class="w-full">
            <option value="">-- No Transfer --</option>
            <option value="Bank Book">Bank Book</option>
            <option value="Cash Book">Cash Book</option>
          </select>
        </div>
      </div>

      <!-- Row 4: DEBIT & CREDIT -->
      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1">
          <label class="font-bold text-emerald-400 uppercase tracking-wide">Debit (Inflow / ရရှိငွေ)</label>
          <input type="number" step="0.01" id="office-debit" value="0" class="w-full text-right text-emerald-400 font-bold border border-emerald-500/20">
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold text-rose-400 uppercase tracking-wide">Credit (Expense / ထွက်ငွေ)</label>
          <input type="number" step="0.01" id="office-credit" value="0" class="w-full text-right text-rose-400 font-bold border border-rose-500/20">
        </div>
      </div>

      <!-- Row 5: LIABILITIES -->
      <div class="flex flex-col gap-1">
        <label class="font-bold text-rose-400 uppercase tracking-wide">Liabilities (ပေးရန်ကျန်ငွေ)</label>
        <input type="number" id="office-liabilities" value="0" class="w-full text-right font-bold text-rose-400 bg-rose-500/5 border border-rose-500/20">
      </div>

      <!-- Row 6: DESCRIPTION -->
      <div class="flex flex-col gap-1">
        <label class="font-bold text-slate-400 uppercase tracking-wide">Description</label>
        <textarea id="office-description" rows="3" required class="w-full" placeholder="အသေးစိတ် စာရင်းရှင်းလင်းချက်..."></textarea>
      </div>

      <!-- Actions Footer -->
      <div class="flex justify-end items-center gap-3 pt-4 border-t border-slate-800">
        <button type="button" onclick="closeOfficeModal()" class="px-4 py-2 rounded-lg text-xs font-bold text-slate-400 hover:text-white transition">Cancel</button>
        <button type="submit" class="px-5 py-2 rounded-lg text-xs font-black bg-indigo-600 hover:bg-indigo-500 text-white shadow-lg shadow-indigo-600/10 transition-all">Confirm</button>
      </div>
    </form>
  </div>
</div>
