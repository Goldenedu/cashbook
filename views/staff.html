<!-- views/staff.html -->
<div class="space-y-5">

  <!-- Header Category Switcher -->
  <div class="flex items-center justify-between bg-[#0c1322] border border-slate-800 p-4 rounded-xl">
    <h2 id="staff-page-title"
      class="text-sm font-extrabold text-white uppercase tracking-wider flex items-center gap-2">
      <i class="fa-solid fa-users text-indigo-400"></i> Full Time Staff List
    </h2>
    <div class="flex items-center gap-2">
      <button onclick="switchStaffCategory('Full Time')"
        class="px-3 py-1.5 rounded-lg text-xs font-bold bg-indigo-600 text-white transition-all">
        Full Time (FID)
      </button>
      <button onclick="switchStaffCategory('Part Time')"
        class="px-3 py-1.5 rounded-lg text-xs font-bold bg-slate-800 text-slate-400 hover:text-white transition-all">
        Part Time (PID)
      </button>
    </div>
  </div>

  <!-- ၁။ Top KPI Stats Cards Grid -->
  <div class="grid grid-cols-1 md:grid-cols-4 gap-4" id="staff-kpi-grid">
    <!-- Dynamic Cards Injected by js/staff.js -->
  </div>

  <!-- ၂။ Control Search & Action Bar -->
  <div
    class="flex flex-col md:flex-row justify-between items-center bg-[#0c1322] border border-slate-800 p-4 rounded-xl gap-4">
    <div class="relative w-full md:w-[500px]">
      <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i
          class="fa-solid fa-magnifying-glass text-xs"></i></span>
      <input type="text" id="staff-search" oninput="onSearchInputStaff()"
        placeholder="Search staff name, position, phone, NRC..."
        class="w-full pl-9 pr-4 py-2 text-xs rounded-lg bg-slate-950 border border-slate-800 text-white focus:outline-none focus:border-indigo-500 transition-all">
    </div>

    <div class="flex items-center gap-2.5 w-full md:w-auto justify-end">
      <button onclick="loadStaffData(false)"
        class="p-2 bg-slate-850 hover:bg-slate-800 border border-slate-800 text-slate-300 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all">
        <i class="fa-solid fa-rotate text-xs"></i> Refresh
      </button>

      <button onclick="exportToCSVStaff()"
        class="p-2 bg-slate-850 hover:bg-slate-800 border border-slate-800 text-slate-300 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all">
        <i class="fa-solid fa-file-export text-xs"></i> Export CSV
      </button>

      <button onclick="openAddModalStaff()"
        class="p-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-xs font-black flex items-center gap-1.5 shadow-lg shadow-indigo-600/10 transition-all">
        <i class="fa-solid fa-plus text-xs"></i> Add Staff Member
      </button>
    </div>
  </div>

  <!-- ၃။ Dynamic Staff Table Grid -->
  <div class="table-container bg-[#0c1322] border border-slate-800 shadow-2xl relative overflow-x-auto">
    <table class="w-full text-left border-collapse min-w-[1800px]">
      <thead>
        <tr class="bg-[#0e172a]">
          <th scope="col" class="w-12 text-center text-slate-400 text-xs py-3">NO</th>
          <th scope="col" class="w-28 text-slate-400 text-xs py-3">JOIN DATE</th>
          <th scope="col" class="min-w-[200px] text-slate-400 text-xs py-3">STAFF IDNAME</th>
          <th scope="col" class="w-28 text-slate-400 text-xs py-3">EDUCATION</th>
          <th scope="col" class="w-36 text-slate-400 text-xs py-3">POSITION</th>
          <th scope="col" class="w-28 text-slate-400 text-xs py-3">SALARY GRADE</th>
          <th scope="col" class="w-28 text-right text-slate-400 text-xs py-3">WORKING DAYS</th>
          <th scope="col" class="w-32 text-right text-slate-400 text-xs py-3">BASIC AMT</th>
          <th scope="col" class="w-32 text-right text-slate-400 text-xs py-3">EXTRA AMT</th>
          <th scope="col" class="w-32 text-right text-slate-400 text-xs py-3">TOTAL SALARY</th>
          <th scope="col" class="w-28 text-right text-emerald-400 text-xs py-3">BONUS</th>
          <th scope="col" class="w-28 text-right text-teal-400 text-xs py-3">FUND</th>
          <th scope="col" class="w-36 text-right text-indigo-400 text-xs py-3">TOTAL NET AMT</th>
          <th scope="col" class="w-24 text-slate-400 text-xs py-3">STATUS</th>
          <th scope="col" class="w-24 text-slate-400 text-xs py-3">GENDER</th>
          <th scope="col" class="w-36 text-slate-400 text-xs py-3">NRC NO</th>
          <th scope="col" class="w-36 text-slate-400 text-xs py-3">BANK ACCOUNT</th>
          <th scope="col" class="w-36 text-slate-400 text-xs py-3">PHONE NO</th>
          <th scope="col" class="w-44 text-slate-400 text-xs py-3">EMAIL</th>
          <th scope="col" class="w-28 text-slate-400 text-xs py-3">FUND DATE</th>
          <th scope="col" class="w-32 text-right text-emerald-400 text-xs py-3">UNPAID BONUS</th>
          <th scope="col" class="w-32 text-right text-teal-400 text-xs py-3">UNPAID FUND</th>
          <th scope="col"
            class="w-24 text-center text-slate-400 text-xs py-3 right-0 sticky bg-[#0c1322] border-l border-slate-800 shadow-lg">
            ACTION</th>
        </tr>
      </thead>
      <tbody id="staff-table-body" class="divide-y divide-slate-800/40 text-slate-300">
        <!-- Dynamic Rows generated by js/staff.js -->
      </tbody>
    </table>
  </div>

  <!-- ၄။ Pagination Controller Tray -->
  <div
    class="flex flex-col sm:flex-row justify-between items-center gap-4 bg-[#0c1322] border border-slate-800 px-6 py-3.5 rounded-xl">
    <div id="staff-pagination-info" class="text-xs font-semibold text-slate-400 tracking-wide">
      Showing entries...
    </div>

    <div class="flex items-center gap-2">
      <button onclick="changePageStaff(-1)" id="staff-btn-prev"
        class="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg bg-slate-850 hover:bg-slate-800 border border-slate-800 text-slate-300 hover:text-white font-bold transition-all disabled:opacity-30 disabled:pointer-events-none text-xs">
        <i class="fa-solid fa-chevron-left text-[10px]"></i> Previous
      </button>
      <button onclick="changePageStaff(1)" id="staff-btn-next"
        class="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg bg-slate-850 hover:bg-slate-800 border border-slate-800 text-slate-300 hover:text-white font-bold transition-all disabled:opacity-30 disabled:pointer-events-none text-xs">
        Next <i class="fa-solid fa-chevron-right text-[10px]"></i>
      </button>
    </div>
  </div>

</div>

<!-- ၅။ Add / Edit Staff Profile Modal -->
<div id="staff-modal"
  class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4">
  <div
    class="bg-[#0c1322] border border-slate-800 rounded-2xl w-full max-w-xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh] animate-in fade-in zoom-in-95 duration-200">
    <div class="px-6 py-4 border-b border-slate-800 flex justify-between items-center bg-[#0e172a] shrink-0">
      <h3 id="staff-form-title" class="text-sm font-black text-white uppercase tracking-wider">Add Staff Member</h3>
      <button onclick="closeStaffModal()" class="text-slate-500 hover:text-white transition"><i
          class="fa-solid fa-xmark text-sm"></i></button>
    </div>

    <form id="staff-form" onsubmit="saveStaffForm(event)" class="p-6 space-y-4 overflow-y-auto flex-1 text-xs">
      <input type="hidden" id="staff-uniqueId">

      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Join Date</label>
          <input type="date" id="staff-joindate" required class="w-full">
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Name (အမည်)</label>
          <input type="text" id="staff-name" required placeholder="ဝန်ထမ်းအမည်..."
            class="w-full font-bold text-slate-100">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Education</label>
          <input type="text" id="staff-education" placeholder="Degree / High School..." class="w-full">
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Position (ရာထူး)</label>
          <input type="text" id="staff-position" required placeholder="Teacher / Admin..." class="w-full">
        </div>
      </div>

      <!-- Full Time Block -->
      <div id="staff-fulltime-fields" class="space-y-4">
        <div class="grid grid-cols-3 gap-4">
          <div class="flex flex-col gap-1">
            <label class="font-bold text-slate-400 uppercase tracking-wide">Salary Grade</label>
            <select id="staff-grade" onchange="onSalaryGradeChangeStaff()" class="w-full">
              <option value="Non">Non</option>
              <option value="Grade A">Grade A</option>
              <option value="Grade B">Grade B</option>
              <option value="Grade C">Grade C</option>
              <option value="Grade D">Grade D</option>
              <option value="Grade E">Grade E</option>
              <option value="Grade F">Grade F</option>
              <option value="Grade G">Grade G</option>
              <option value="Grade H">Grade H</option>
            </select>
          </div>
          <div class="flex flex-col gap-1">
            <label class="font-bold text-slate-400 uppercase tracking-wide">Working Days</label>
            <input type="number" id="staff-working-days" value="26" class="w-full text-right font-bold text-slate-100">
          </div>
          <div class="flex flex-col gap-1">
            <label class="font-bold text-slate-400 uppercase tracking-wide">Basic Amt</label>
            <input type="number" id="staff-basic" value="0" class="w-full text-right text-emerald-400 font-extrabold">
          </div>
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Extra Amt (Allowances/Deductions)</label>
          <input type="number" id="staff-extra" value="0"
            class="w-full text-right text-rose-400 font-bold bg-rose-500/5">
        </div>
      </div>

      <!-- Part Time Block -->
      <div id="staff-parttime-fields" class="flex flex-col gap-1 hidden">
        <label class="font-bold text-slate-400 uppercase tracking-wide">Part Time Salary (Total Net)</label>
        <input type="number" id="staff-total-salary" value="0"
          class="w-full text-right text-indigo-400 font-extrabold bg-indigo-500/5 border border-indigo-500/20">
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">NRC No</label>
          <input type="text" id="staff-nrc" placeholder="NRC No..." class="w-full font-mono">
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Bank Account</label>
          <input type="text" id="staff-bank" placeholder="KPAY / KBZ Acc..." class="w-full font-mono">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Phone No</label>
          <input type="text" id="staff-phone" placeholder="09xxxxxxxxx" class="w-full font-mono">
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Email</label>
          <input type="email" id="staff-email" placeholder="staff@email.com" class="w-full font-mono">
        </div>
      </div>

      <div class="flex flex-col gap-1">
        <label class="font-bold text-rose-400 uppercase tracking-wide">Resigned Date (နုတ်ထွက်ပါက ဖြည့်ရန်)</label>
        <input type="date" id="staff-resigned" class="w-full text-rose-400 border border-slate-800 bg-rose-500/5">
      </div>

      <div class="flex justify-end items-center gap-3 pt-4 border-t border-slate-800">
        <button type="button" onclick="closeStaffModal()"
          class="px-4 py-2 rounded-lg text-xs font-bold text-slate-400 hover:text-white transition">Cancel</button>
        <button type="submit"
          class="px-5 py-2 rounded-lg text-xs font-black bg-indigo-600 hover:bg-indigo-500 text-white shadow-lg shadow-indigo-600/10 transition-all">Confirm</button>
      </div>
    </form>
  </div>
</div>
