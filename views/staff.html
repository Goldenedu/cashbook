<!-- views/staff.html -->
<div class="space-y-5">

  <!-- Header Category Switcher Bar -->
  <div class="flex flex-col sm:flex-row items-center justify-between bg-[#0c1322] border border-slate-800 p-4 rounded-xl gap-4">
    <h2 id="staff-page-title" class="text-sm font-extrabold text-white uppercase tracking-wider flex items-center gap-2">
      <i class="fa-solid fa-users text-indigo-400"></i> Full Time Staff List (FID)
    </h2>
    <div class="flex items-center gap-2">
      <button onclick="switchStaffCategory('Full Time')" id="staff-tab-ft" class="px-4 py-2 rounded-lg text-xs font-bold transition-all bg-indigo-600 text-white shadow-lg shadow-indigo-600/10">
        <i class="fa-solid fa-user-check mr-1.5"></i> Full Time (FID)
      </button>
      <button onclick="switchStaffCategory('Part Time')" id="staff-tab-pt" class="px-4 py-2 rounded-lg text-xs font-bold transition-all bg-slate-800 text-slate-400 hover:text-white">
        <i class="fa-solid fa-user-clock mr-1.5"></i> Part Time (PID)
      </button>
    </div>
  </div>

  <!-- ၁။ Top KPI Stats Cards Grid -->
  <div class="grid grid-cols-1 md:grid-cols-4 gap-4" id="staff-kpi-grid"></div>

  <!-- ၂။ Control Search & Action Bar -->
  <div class="flex flex-col md:flex-row justify-between items-center bg-[#0c1322] border border-slate-800 p-4 rounded-xl gap-4">
    <div class="relative w-full md:w-[450px]">
      <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i class="fa-solid fa-magnifying-glass text-xs"></i></span>
      <input type="text" id="staff-search-input" oninput="onSearchInputStaff()" placeholder="Search staff name, position, phone, NRC..." class="w-full pl-9 pr-4 py-2 text-xs rounded-lg bg-[#0f172a] border border-slate-800 text-white focus:outline-none focus:border-indigo-500 transition-all">
    </div>

    <div class="flex items-center gap-2.5 w-full md:w-auto justify-end flex-wrap">
      <button onclick="loadStaffData(false)" class="p-2 bg-slate-850 hover:bg-slate-800 border border-slate-800 text-slate-300 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all" title="Refresh Data">
        <i class="fa-solid fa-rotate text-xs"></i> Refresh
      </button>

      <!-- 💡 EDIT SALARY GRADE BUTTON -->
      <button onclick="openGradeModal()" id="btn-edit-grade" class="p-2 bg-amber-600 hover:bg-amber-500 text-white rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all shadow-lg shadow-amber-600/10">
        <i class="fa-solid fa-sliders text-xs"></i> Edit Salary Grade
      </button>

      <button onclick="exportToCSVStaff()" class="p-2 bg-slate-850 hover:bg-slate-800 border border-slate-800 text-slate-300 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all">
        <i class="fa-solid fa-file-export text-xs"></i> Export CSV
      </button>

      <button onclick="openAddModalStaff()" class="p-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-xs font-black flex items-center gap-1.5 shadow-lg shadow-indigo-600/10 transition-all">
        <i class="fa-solid fa-plus text-xs"></i> Add Staff Record
      </button>
    </div>
  </div>

  <!-- ၃။ Dynamic Staff Table Grid -->
  <div class="table-container bg-[#0c1322] border border-slate-800 shadow-2xl relative overflow-x-auto">
    <table class="w-full text-left border-collapse min-w-[1800px]">
      <thead id="staff-table-head"></thead>
      <tbody id="staff-table-body" class="divide-y divide-slate-800/40 text-slate-300"></tbody>
    </table>
  </div>

  <!-- ၄။ Pagination Controller Tray -->
  <div class="flex flex-col sm:flex-row justify-between items-center gap-4 bg-[#0c1322] border border-slate-800 px-6 py-3.5 rounded-xl">
    <div id="staff-pagination-info" class="text-xs font-semibold text-slate-400 tracking-wide">Showing entries...</div>
    <div class="flex items-center gap-2">
      <button onclick="changePageStaff(-1)" id="staff-btn-prev" class="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg bg-slate-850 hover:bg-slate-800 border border-slate-800 text-slate-300 hover:text-white font-bold transition-all text-xs"><i class="fa-solid fa-chevron-left text-[10px]"></i> Previous</button>
      <button onclick="changePageStaff(1)" id="staff-btn-next" class="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg bg-slate-850 hover:bg-slate-800 border border-slate-800 text-slate-300 hover:text-white font-bold transition-all text-xs">Next <i class="fa-solid fa-chevron-right text-[10px]"></i></button>
    </div>
  </div>

</div>

<!-- STAFF FORM MODAL -->
<div id="staff-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4">
  <div class="bg-[#0c1322] border border-slate-800 rounded-2xl w-full max-w-xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh] animate-in fade-in zoom-in-95 duration-200">
    <div class="px-6 py-4 border-b border-slate-800 flex justify-between items-center bg-[#0e172a] shrink-0">
      <h3 id="staff-form-title" class="text-sm font-black text-white uppercase tracking-wider">Add Staff Record</h3>
      <button onclick="closeStaffModal()" class="text-slate-500 hover:text-white transition"><i class="fa-solid fa-xmark text-sm"></i></button>
    </div>

    <form id="staff-form" onsubmit="saveStaffForm(event)" class="p-6 space-y-4 overflow-y-auto flex-1 text-xs">
      <input type="hidden" id="staff-uniqueId">

      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Join Date (အလုပ်စဝင်ရက်)</label>
          <input type="date" id="staff-joindate" required class="w-full bg-[#0f172a] border border-slate-800 text-slate-100 rounded-lg p-2.5 outline-none focus:border-indigo-500">
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Name (အမည်)</label>
          <input type="text" id="staff-name" required placeholder="ဝန်ထမ်းအမည်..." class="w-full bg-[#0f172a] border border-slate-800 text-slate-100 font-bold rounded-lg p-2.5 outline-none focus:border-indigo-500">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Education (ပညာအရည်အချင်း)</label>
          <select id="staff-education" required class="w-full bg-[#0f172a] border border-slate-800 text-slate-100 rounded-lg p-2.5 outline-none focus:border-indigo-500"></select>
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Position (ရာထူး)</label>
          <select id="staff-position" required class="w-full bg-[#0f172a] border border-slate-800 text-slate-100 rounded-lg p-2.5 outline-none focus:border-indigo-500"></select>
        </div>
      </div>

      <!-- Full Time Block -->
      <div id="staff-fulltime-fields" class="space-y-4">
        <div class="grid grid-cols-3 gap-4">
          <div class="flex flex-col gap-1">
            <label class="font-bold text-slate-400 uppercase tracking-wide">Salary Grade</label>
            <select id="staff-grade" onchange="onSalaryGradeChangeStaff()" class="w-full bg-[#0f172a] border border-slate-800 text-slate-100 rounded-lg p-2.5 outline-none focus:border-indigo-500"></select>
          </div>
          <div class="flex flex-col gap-1">
            <label class="font-bold text-slate-400 uppercase tracking-wide">Working Days</label>
            <input type="number" id="staff-working-days" value="26" oninput="calculateLiveStaffSalary()" class="w-full text-right font-bold text-slate-100 bg-[#0f172a] border border-slate-800 rounded-lg p-2.5 outline-none focus:border-indigo-500">
          </div>
          <div class="flex flex-col gap-1">
            <label class="font-bold text-slate-400 uppercase tracking-wide">Basic Amt</label>
            <input type="number" id="staff-basic" value="0" oninput="calculateLiveStaffSalary()" class="w-full text-right text-emerald-400 font-extrabold bg-[#0f172a] border border-slate-800 rounded-lg p-2.5 outline-none focus:border-emerald-500">
          </div>
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Extra Amt (Allowances/Deductions)</label>
          <input type="number" id="staff-extra" value="0" oninput="calculateLiveStaffSalary()" class="w-full text-right text-rose-400 font-bold bg-rose-500/5 border border-rose-500/20 rounded-lg p-2.5 outline-none focus:border-rose-500">
        </div>

        <div id="staff-salary-preview-box" class="p-3.5 bg-slate-900 border border-slate-800 rounded-xl space-y-2">
          <div class="text-[10px] font-black text-indigo-400 uppercase tracking-wider flex items-center gap-1.5">
            <i class="fa-solid fa-calculator"></i> Live Salary Breakdown Preview (ရရှိမည့် လစာအသေးစိတ်):
          </div>
          <div class="grid grid-cols-3 gap-2 text-[11px]">
            <div><span class="text-slate-500">Total Salary:</span> <br><span id="preview-total-salary" class="font-bold text-slate-200">0 MMK</span></div>
            <div><span class="text-slate-500">Bonus:</span> <br><span id="preview-bonus" class="font-bold text-emerald-400">0 MMK</span></div>
            <div><span class="text-slate-500">Fund (5%):</span> <br><span id="preview-fund" class="font-bold text-teal-400">0 MMK</span></div>
          </div>
          <div class="pt-2 border-t border-slate-800 flex justify-between items-center text-xs">
            <span class="font-extrabold text-slate-300 uppercase">Total Net Amount:</span>
            <span id="preview-total-net" class="font-black text-indigo-400 text-sm">0 MMK</span>
          </div>
        </div>
      </div>

      <!-- Part Time Block -->
      <div id="staff-parttime-fields" class="flex flex-col gap-1 hidden">
        <label class="font-bold text-indigo-400 uppercase tracking-wide">Part Time Salary (Total Net / စုစုပေါင်းလစာ)</label>
        <input type="number" id="staff-total-salary" value="0" class="w-full text-right text-indigo-400 font-extrabold bg-indigo-500/5 border border-indigo-500/20 rounded-lg p-2.5 outline-none focus:border-indigo-500">
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">NRC No (မှတ်ပုံတင်အမှတ်)</label>
          <input type="text" id="staff-nrc" placeholder="NRC No..." class="w-full font-mono bg-[#0f172a] border border-slate-800 text-slate-100 rounded-lg p-2.5 outline-none focus:border-indigo-500">
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Bank Account (KPAY / ဘဏ်စာရင်း)</label>
          <input type="text" id="staff-bank" placeholder="KPAY / Wave / KBZ Acc..." class="w-full font-mono bg-[#0f172a] border border-slate-800 text-slate-100 rounded-lg p-2.5 outline-none focus:border-indigo-500">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Phone No (ဖုန်းနံပါတ်)</label>
          <input type="text" id="staff-phone" placeholder="09xxxxxxxxx" class="w-full font-mono bg-[#0f172a] border border-slate-800 text-slate-100 rounded-lg p-2.5 outline-none focus:border-indigo-500">
        </div>
        <div class="flex flex-col gap-1">
          <label class="font-bold text-slate-400 uppercase tracking-wide">Email (အီးမေးလ်)</label>
          <input type="email" id="staff-email" placeholder="staff@email.com" class="w-full font-mono bg-[#0f172a] border border-slate-800 text-slate-100 rounded-lg p-2.5 outline-none focus:border-indigo-500">
        </div>
      </div>

      <div class="flex flex-col gap-1">
        <label class="font-bold text-rose-400 uppercase tracking-wide">Resigned Date (နုတ်ထွက်ပါက ဖြည့်ရန်)</label>
        <input type="date" id="staff-resigned" class="w-full text-rose-400 bg-rose-500/5 border border-rose-500/20 rounded-lg p-2.5 outline-none focus:border-rose-500">
      </div>

      <div class="flex justify-end items-center gap-3 pt-4 border-t border-slate-800">
        <button type="button" onclick="closeStaffModal()" class="px-4 py-2 rounded-lg text-xs font-bold text-slate-400 hover:text-white transition">Cancel</button>
        <button type="submit" class="px-5 py-2 rounded-lg text-xs font-black bg-indigo-600 hover:bg-indigo-500 text-white shadow-lg shadow-indigo-600/10 transition-all">Confirm</button>
      </div>
    </form>
  </div>
</div>
